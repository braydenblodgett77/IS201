<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Score Keeper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2d6a2d;
            color: white;
            text-align: center;
            padding: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1em;
            margin-bottom: 30px;
            color: #c8f0c8;
        }

        .scoreboard {
            background-color: #1a3d1a;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2em;
        }

        th, td {
            padding: 12px;
            border: 1px solid #4a8f4a;
            text-align: center;
        }

        th {
            background-color: #3a7a3a;
        }

        .player-name {
            text-align: left;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-p1 {
            background-color: #f0c040;
            color: #1a3d1a;
        }

        .btn-p2 {
            background-color: #40a0f0;
            color: white;
        }

        .btn-reset {
            background-color: #cc3333;
            color: white;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .status {
            font-size: 1.3em;
            margin: 15px 0;
            font-weight: bold;
            color: #f0e080;
            min-height: 30px;
        }

        .winner-banner {
            background-color: #f0c040;
            color: #1a3d1a;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.5em;
            font-weight: bold;
            max-width: 600px;
            margin: 0 auto 20px auto;
            display: none;
        }

        .name-inputs {
            margin-bottom: 20px;
        }

        .name-inputs input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            font-size: 1em;
            width: 180px;
        }

        a.back-link {
            color: #c8f0c8;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

    <h1>🎾 Tennis Score Keeper</h1>
    <p class="subtitle">Track sets, games, and points</p>

    <div class="name-inputs">
        <input type="text" id="name1" placeholder="Player 1 Name" oninput="updateNames()" />
        <input type="text" id="name2" placeholder="Player 2 Name" oninput="updateNames()" />
    </div>

    <div class="winner-banner" id="winnerBanner"></div>

    <div class="scoreboard">
        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Sets</th>
                    <th>Games</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="player-name" id="label1">Player 1</td>
                    <td id="sets1">0</td>
                    <td id="games1">0</td>
                    <td id="points1">0</td>
                </tr>
                <tr>
                    <td class="player-name" id="label2">Player 2</td>
                    <td id="sets2">0</td>
                    <td id="games2">0</td>
                    <td id="points2">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="status" id="status">First to win 2 sets wins the match!</div>

    <div class="buttons">
        <button class="btn btn-p1" onclick="scorePoint(1)">Point — Player 1</button>
        <button class="btn btn-p2" onclick="scorePoint(2)">Point — Player 2</button>
    </div>
    <div class="buttons">
        <button class="btn btn-reset" onclick="resetMatch()">Reset Match</button>
    </div>

    <a class="back-link" href="scratch.html">← Back to Scratch Page</a>

    <script>
        const pointSequence = [0, 15, 30, 40];
        let state = {
            points: [0, 0],
            games: [0, 0],
            sets: [0, 0],
            deuce: false,
            advantage: -1,
            matchOver: false
        };

        function updateNames() {
            const n1 = document.getElementById('name1').value || 'Player 1';
            const n2 = document.getElementById('name2').value || 'Player 2';
            document.getElementById('label1').textContent = n1;
            document.getElementById('label2').textContent = n2;
        }

        function getPointLabel(p) {
            return pointSequence[p];
        }

        function scorePoint(player) {
            if (state.matchOver) return;
            const p = player - 1;
            const opp = 1 - p;

            // Handle deuce/advantage
            if (state.points[0] === 3 && state.points[1] === 3) {
                if (state.advantage === -1) {
                    state.advantage = p;
                    updateStatus(`Advantage ${getPlayerName(p + 1)}`);
                } else if (state.advantage === p) {
                    winGame(p);
                } else {
                    state.advantage = -1;
                    updateStatus('Deuce');
                }
                updateDisplay();
                return;
            }

            state.points[p]++;

            // Check for deuce
            if (state.points[0] === 3 && state.points[1] === 3) {
                state.deuce = true;
                updateStatus('Deuce');
                updateDisplay();
                return;
            }

            // Win game at 4 points (40 + 1)
            if (state.points[p] >= 4) {
                winGame(p);
                return;
            }

            updateStatus('');
            updateDisplay();
        }

        function winGame(p) {
            state.games[p]++;
            state.points = [0, 0];
            state.deuce = false;
            state.advantage = -1;

            // Win set at 6 games (with 2 game lead)
            if (state.games[p] >= 6 && state.games[p] - state.games[1 - p] >= 2) {
                winSet(p);
                return;
            }

            updateStatus('');
            updateDisplay();
        }

        function winSet(p) {
            state.sets[p]++;
            state.games = [0, 0];

            if (state.sets[p] >= 2) {
                state.matchOver = true;
                document.getElementById('winnerBanner').style.display = 'block';
                document.getElementById('winnerBanner').textContent = `🏆 ${getPlayerName(p + 1)} wins the match!`;
                updateStatus('Match over!');
            } else {
                updateStatus(`${getPlayerName(p + 1)} wins the set!`);
            }
            updateDisplay();
        }

        function getPlayerName(player) {
            const val = document.getElementById('name' + player).value;
            return val || 'Player ' + player;
        }

        function updateStatus(msg) {
            document.getElementById('status').textContent = msg || 'First to win 2 sets wins the match!';
        }

        function updateDisplay() {
            document.getElementById('sets1').textContent = state.sets[0];
            document.getElementById('sets2').textContent = state.sets[1];
            document.getElementById('games1').textContent = state.games[0];
            document.getElementById('games2').textContent = state.games[1];

            if (state.points[0] === 3 && state.points[1] === 3) {
                document.getElementById('points1').textContent = '40';
                document.getElementById('points2').textContent = '40';
            } else {
                document.getElementById('points1').textContent = getPointLabel(state.points[0]);
                document.getElementById('points2').textContent = getPointLabel(state.points[1]);
            }
        }

        function resetMatch() {
            state = { points: [0, 0], games: [0, 0], sets: [0, 0], deuce: false, advantage: -1, matchOver: false };
            document.getElementById('winnerBanner').style.display = 'none';
            updateStatus('First to win 2 sets wins the match!');
            updateDisplay();
        }

        ef="ai.html">"Tennis Score Keeper"</a></li>
    </script>

</body>
</html>
